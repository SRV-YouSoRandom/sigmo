server {
    listen 80;
    server_name tg.sigmo.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tg.sigmo.online;

    ssl_certificate     /etc/letsencrypt/live/tg.sigmo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tg.sigmo.online/privkey.pem;

    location /webhook {
        proxy_pass         http://fastapi:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass         http://fastapi:8000;
        proxy_set_header   Host $host;
    }

    location /metrics {
        proxy_pass         http://fastapi:8000/metrics;
        allow              127.0.0.1;
        deny               all;
    }
}

# ── Landing page (sigmo.online) ──────────────────────────────────────────────
server {
    listen 80;
    server_name sigmo.online www.sigmo.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sigmo.online www.sigmo.online;

    ssl_certificate     /etc/letsencrypt/live/sigmo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sigmo.online/privkey.pem;

    location / {
        proxy_pass         http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass         http://host.docker.internal:3000;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }
}